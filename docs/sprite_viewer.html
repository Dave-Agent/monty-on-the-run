<title>Monty on the Run — Sprite Viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c18;--surf:#131322;--border:#1e1e38;
  --acc:#70a4b2;--txt:#c8c8e4;--dim:#505070;
  --spr-fg:#b8c76f;
}
body{background:var(--bg);color:var(--txt);
  font-family:ui-monospace,'Cascadia Code','JetBrains Mono',Consolas,'Courier New',monospace;
  font-size:13px;min-height:100vh;}

#hdr{
  position:sticky;top:0;z-index:10;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:.6rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem 1rem;align-items:center;
}
#title{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--acc);white-space:nowrap}

#pal{display:grid;grid-template-columns:repeat(8,18px);
  grid-template-rows:repeat(2,18px);gap:3px;flex-shrink:0}
.sw{width:18px;height:18px;border-radius:2px;cursor:pointer;
  border:2px solid transparent;transition:transform .1s,border-color .1s;outline:none}
.sw:focus-visible{outline:1px solid #fff;outline-offset:1px}
.sw.on{border-color:#fff;transform:scale(1.18)}

#chips{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.chip{background:transparent;border:1px solid var(--border);color:var(--dim);
  padding:.18rem .5rem;font:inherit;font-size:.65rem;letter-spacing:.04em;
  cursor:pointer;border-radius:1px;transition:all .12s}
.chip:hover{border-color:var(--acc);color:var(--txt)}
.chip.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:600}
.chip-n{opacity:.7;font-size:.6rem}

#tog-row{display:flex;gap:.8rem;align-items:center}
.tog{display:flex;align-items:center;gap:.3rem;font-size:.65rem;
  color:var(--dim);cursor:pointer;user-select:none;white-space:nowrap}
.tog input{accent-color:var(--acc);cursor:pointer}

#bar{padding:.3rem 1rem;font-size:.62rem;color:var(--dim);
  letter-spacing:.06em;border-bottom:1px solid var(--border)}

#grid{padding:.8rem 1rem;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}

.card{background:var(--surf);border:1px solid var(--border);
  padding:6px 6px 5px;display:flex;flex-direction:column;align-items:center;
  gap:4px;cursor:pointer;border-radius:1px;transition:border-color .12s,background .12s;
  position:relative}
.card:hover{border-color:var(--acc);background:#181828}
.card:focus-visible{outline:1px solid var(--acc);outline-offset:1px}
.card.copied::after{content:'copied';position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;background:rgba(112,164,178,.85);
  color:#000;font-size:.65rem;letter-spacing:.1em;pointer-events:none}
.card.nodata{opacity:.25;pointer-events:none}

.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

canvas{display:block;image-rendering:pixelated;
  filter:drop-shadow(0 0 2px var(--spr-fg))}
.card.nodata canvas,.card.empty canvas{filter:none}

.lbl{text-align:center;line-height:1.4}
.lbl-name{color:var(--txt);font-size:.6rem;letter-spacing:.02em}
.lbl-name.unnamed{color:var(--dim);font-style:italic}
.lbl-addr{color:var(--dim);font-size:.56rem}

body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(to bottom,transparent,transparent 2px,
  rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 3px)}
</style>

e,"hex":"ef01bdff0100ffff0000ffff0000fff71000fffd0000ffff1100ffff0000ffbe4000ffff2100ffff0000fffb000011fd0000ffff0100ffff0000ffff810011"},{"addr":32576,"addrH":"$7F40","ptr":"$FD","cat":"nodata","name":"","empty":false,"hex":"8800ffff0000ffff0000fffd0101fefb0000ffff0000ffff0041ffffcb00feff0000ffbf0240ffff0000ffff0024ff350000ffff0000ffff00897fb5018cfa"},{"addr":32640,"addrH":"$7F80","ptr":"$FE","cat":"nodata","name":"","empty":false,"hex":"ef09ffff0000ffff0000ffff0000fffb1000ffff0000ffff0000ffff0000fffe0000ffff0100ffff0000fffe000011fe0000ffff0100ffff0000ffff090011"},{"addr":32704,"addrH":"$7FC0","ptr":"$FF","cat":"nodata","name":"","empty":false,"hex":"8000ffff0080ffff0000ffff0101feff0000ffff0000ffff0001ffff4b00feff0000fffd0000fffe0200ffff0080fff50000ffff0000fbff00097ff50190fe"}];
const CAT_COLOR={"slot": "#6c5eb5", "monty": "#9ad284", "lift": "#70a4b2", "jetpack": "#6f4f25", "bubble": "#6f3d86", "piledriver": "#b8c76f", "si": "#6f4f25", "cloud": "#959595", "boat": "#588d43", "c5": "#68372b", "misc": "#444444", "gameover": "#9a6759", "fx": "#6c6c6c", "nodata": "#222233"};
const C64=[
  ['#000000','BLACK'],['#ffffff','WHITE'],['#68372b','RED'],['#70a4b2','CYAN'],
  ['#6f3d86','PURPLE'],['#588d43','GREEN'],['#352879','BLUE'],['#b8c76f','YELLOW'],
  ['#6f4f25','ORANGE'],['#433900','BROWN'],['#9a6759','LIGHT_RED'],['#444444','DARK_GRAY'],
  ['#6c6c6c','GRAY'],['#9ad284','LIGHT_GREEN'],['#6c5eb5','LIGHT_BLUE'],['#959595','LIGHT_GRAY'],
];

const SCALE=3,W=24*SCALE,H=21*SCALE,BG='#0c0c18';
let fg=C64[7][0],cat='all',showNodata=false,showEmpty=false;

/* palette */
const palEl=document.getElementById('pal');
C64.forEach(([col,name],i)=>{
  const b=document.createElement('button');
  b.className='sw'+(col===fg?' on':'');
  b.style.background=col;b.title=name;b.tabIndex=0;
  b.onclick=()=>{
    palEl.querySelectorAll('.sw').forEach(s=>s.classList.remove('on'));
    b.classList.add('on');fg=col;
    document.documentElement.style.setProperty('--spr-fg',fg);
    redrawFg();
  };
  palEl.appendChild(b);
});

document.querySelectorAll('.chip').forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    c.classList.add('on');cat=c.dataset.cat;render();
  };
});
document.getElementById('show-nodata').onchange=e=>{showNodata=e.target.checked;render()};
document.getElementById('show-empty').onchange=e=>{showEmpty=e.target.checked;render()};

function draw(canvas,hex,color){
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=color;
  for(let r=0;r<21;r++)for(let c=0;c<24;c++){
    const bi=r*3+(c>>3),b=parseInt(hex.substr(bi*2,2),16);
    if(b&(1<<(7-(c&7))))ctx.fillRect(c*SCALE,r*SCALE,SCALE,SCALE);
  }
}
function drawEmpty(canvas,color){
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=color||'#1e1e38';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(W,H);
  ctx.moveTo(W,0);ctx.lineTo(0,H);ctx.stroke();
}

function visible(){
  return SPRITES.filter(s=>
    (cat==='all'||s.cat===cat)&&
    (showNodata||s.cat!=='nodata')&&
    (showEmpty||!s.empty)
  );
}

function render(){
  const list=visible();
  document.getElementById('bar').textContent=
    list.length+' frame'+(list.length!==1?'s':'');
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  list.forEach(s=>{
    const card=document.createElement('div');
    card.className='card'+(s.empty?' empty':'')+(s.cat==='nodata'?' nodata':'');
    card.tabIndex=s.cat==='nodata'?-1:0;
    card.title=(s.name||s.addrH)+' — click to copy';

    // dot
    const dot=document.createElement('div');
    dot.className='cat-dot';
    dot.style.background=CAT_COLOR[s.cat]||'#333';

    const cv=document.createElement('canvas');
    cv.width=W;cv.height=H;
    const cc=CAT_COLOR[s.cat]||fg;
    s.empty?drawEmpty(cv,cc):draw(cv,s.hex,s.cat==='nodata'?cc:fg);

    const lbl=document.createElement('div');
    lbl.className='lbl';
    const nm=s.name||s.addrH;
    lbl.innerHTML=`<div class="lbl-name${s.name?'':' unnamed'}">${nm}</div>`+
                  `<div class="lbl-addr">${s.addrH} / ${s.ptr}</div>`;

    card.appendChild(dot);card.appendChild(cv);card.appendChild(lbl);
    if(s.cat!=='nodata'){
      card.onclick=()=>copyAddr(card,s.addrH);
      card.onkeydown=e=>e.key==='Enter'&&copyAddr(card,s.addrH);
    }
    grid.appendChild(card);
  });
}

function redrawFg(){
  const list=visible();
  let fi=0;
  document.querySelectorAll('.card:not(.nodata):not(.empty) canvas').forEach(cv=>{
    const s=list.filter(x=>x.cat!=='nodata'&&!x.empty)[fi++];
    if(s)draw(cv,s.hex,fg);
  });
}

function copyAddr(card,addr){
  navigator.clipboard?.writeText(addr).catch(()=>{});
  card.classList.add('copied');
  setTimeout(()=>card.classList.remove('copied'),700);
}

document.documentElement.style.setProperty('--spr-fg',fg);
render();
</script>

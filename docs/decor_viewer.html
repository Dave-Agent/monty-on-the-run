<title>decor_viewer · Monty on the Run</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;
  --surface:#0c1422;
  --lift:#111d2e;
  --border:#1a3050;
  --border-hi:#254468;
  --text:#8ab0c8;
  --muted:#2e4a68;
  --accent:#3ea8d0;
  --warm:#c09038;
  --dim:#4a7090;
  --id:#4898c0;
  --addr:#2c6648;
  --filt-active-bg:#0e2034;
  --filt-active-border:#3888b0;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Consolas,'Courier New',monospace;
  font-size:11px;
  line-height:1.5;
  min-height:100vh;
}

/* ── sticky header ── */
#top{
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 14px 0;
}
.title-row{
  display:flex;align-items:baseline;gap:12px;
  padding-bottom:9px;
  border-bottom:1px solid var(--border);
  margin-bottom:8px;
}
.brand{
  font-size:13px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:#a8c8e0;
}
.sub{
  font-size:10px;color:var(--muted);
  flex:1;
}
.sub code{color:var(--id);letter-spacing:.04em}
.actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
#counter{
  font-size:10px;color:var(--dim);
  letter-spacing:.06em;
  font-variant-numeric:tabular-nums;
}
#counter .n{color:var(--accent)}
#copy-btn{
  background:var(--lift);border:1px solid var(--border-hi);
  color:var(--text);font-family:inherit;font-size:10px;
  padding:3px 10px;cursor:pointer;
  letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;
}
#copy-btn:hover{background:var(--filt-active-bg);border-color:var(--accent)}
#copy-btn:focus-visible{outline:1px solid var(--accent);outline-offset:2px}

/* ── filter bar ── */
.filters{
  display:flex;align-items:center;gap:4px;
  padding-bottom:8px;
  flex-wrap:wrap;
}
.filter-group{display:flex;gap:2px}
.filt{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:inherit;font-size:10px;
  padding:2px 8px;cursor:pointer;
  letter-spacing:.06em;
  transition:color .12s,background .12s,border-color .12s;
}
.filt:hover{color:var(--text);border-color:var(--border-hi)}
.filt.active{
  background:var(--filt-active-bg);
  border-color:var(--filt-active-border);
  color:var(--accent);
}
.filt .badge{
  font-size:9px;color:var(--dim);
  margin-left:3px;
}
.filt.active .badge{color:var(--accent)}
.filter-sep{
  width:1px;height:14px;
  background:var(--border);
  margin:0 4px;align-self:center;
}

/* ── grid ── */
#grid{
  display:flex;flex-wrap:wrap;
  gap:7px;align-items:flex-start;
  padding:12px 14px;
}

/* ── card ── */
.card{
  width:216px;flex-shrink:0;
  background:var(--surface);
  border:1px solid var(--border);
  padding:7px;
  display:flex;flex-direction:column;gap:5px;
}
.card-head{
  display:flex;align-items:baseline;
  justify-content:space-between;gap:4px;
}
.type-id{
  font-size:12px;font-weight:700;
  color:var(--id);letter-spacing:.1em;
}
.meta-right{
  display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end;
}
.chip{
  font-size:9px;padding:1px 5px;
  border:1px solid;letter-spacing:.04em;
  white-space:nowrap;
}
.chip-dim{color:var(--dim);border-color:var(--muted)}
.chip-solid{color:var(--dim);border-color:var(--muted)}
.chip-stream{color:var(--warm);border-color:#6a5020}
.addr-tag{
  font-size:9px;color:var(--addr);letter-spacing:.04em;
}

/* ── canvas wrapper ── */
.cv-wrap{
  background:#000;
  display:flex;justify-content:center;align-items:center;
  line-height:0;
  border:1px solid #0d1c2c;
}
canvas{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}

/* ── name input ── */
.name-input{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border);
  color:var(--text);
  font-family:inherit;font-size:11px;
  padding:3px 2px;width:100%;
  outline:none;
}
.name-input::placeholder{color:var(--muted)}
.name-input:focus{border-bottom-color:var(--accent)}
.name-input.has-name{color:#b8d8f0;border-bottom-color:var(--border-hi)}

/* ── toast ── */
#toast{
  position:fixed;bottom:16px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:#0e1e30;color:var(--text);
  padding:6px 16px;font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;
  opacity:0;transition:opacity .18s,transform .18s;
  pointer-events:none;border:1px solid var(--border-hi);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── empty-filter message ── */
#empty{
  display:none;padding:24px 14px;
  font-size:11px;color:var(--muted);letter-spacing:.06em;
}
</style>

// ── decode hex string ──────────────────────────────────────────────────────────
function hx(s){
  if(!s)return new Uint8Array(0);
  const a=new Uint8Array(s.length>>1);
  for(let i=0;i<a.length;i++)a[i]=parseInt(s.substr(i*2,2),16);
  return a;
}

// ── compute scale: fits in 200px width and unconstrained height (min 2, max 8) ─
function scaleFor(t){
  return Math.min(8, Math.max(2,
    Math.min(
      Math.floor(200/(t.w*8)),
      Math.floor(200/(t.h*8))
    )
  ));
}

// ── render one type onto a canvas ─────────────────────────────────────────────
function renderType(canvas,t){
  const bmp=hx(t.bmp), cols=hx(t.cols);
  const s=scaleFor(t);
  canvas.width =t.w*8*s;
  canvas.height=t.h*8*s;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let cell=0;cell<t.w*t.h;cell++){
    const cx=(cell%t.w)*8*s;
    const cy=Math.floor(cell/t.w)*8*s;
    const fg=C64[cols[cell]&0xf];
    for(let row=0;row<8;row++){
      const b=bmp[cell*8+row];
      for(let col=0;col<8;col++){
        if((b>>(7-col))&1){
          ctx.fillStyle=fg;
          ctx.fillRect(cx+col*s,cy+row*s,s,s);
        }
      }
    }
  }
}

// ── filter state ──────────────────────────────────────────────────────────────
let activeStatus='all', activeMode='all';

function applyFilter(){
  let visible=0;
  document.querySelectorAll('.card').forEach(card=>{
    const mode=card.dataset.mode;
    const named=card.dataset.named==='1';
    const statusOk = activeStatus==='all'
      || (activeStatus==='named'&&named)
      || (activeStatus==='unnamed'&&!named);
    const modeOk = activeMode==='all' || mode===activeMode;
    const show=statusOk&&modeOk;
    card.style.display=show?'':'none';
    if(show)visible++;
  });
  document.getElementById('empty').style.display=visible?'none':'block';
}

function updateBadges(){
  const total=TYPES.length;
  let named=0;
  document.querySelectorAll('.name-input').forEach(inp=>{
    if(inp.value.trim())named++;
  });
  const unnamed=total-named;
  document.getElementById('badge-all').textContent=total;
  document.getElementById('badge-unnamed').textContent=unnamed;
  document.getElementById('badge-named').textContent=named;
  const ctr=document.getElementById('counter');
  ctr.innerHTML=`<span class="n">${named}</span> / ${total} named`;
}

function updateCardNamed(card,inp){
  const has=!!inp.value.trim();
  card.dataset.named=has?'1':'0';
  inp.classList.toggle('has-name',has);
}

// ── filter button clicks ───────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.filt');
  if(!btn)return;
  const group=btn.closest('.filter-group');
  group.querySelectorAll('.filt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(group.dataset.group==='status') activeStatus=btn.dataset.val;
  else                                activeMode  =btn.dataset.val;
  applyFilter();
});

// ── build grid ────────────────────────────────────────────────────────────────
const grid=document.getElementById('grid');

TYPES.forEach(t=>{
  const isStream=t.colDesc.startsWith('stream');
  const card=document.createElement('div');
  card.className='card';
  card.dataset.mode=isStream?'stream':'solid';
  card.dataset.named='0';

  const modeChip=isStream
    ?`<span class="chip chip-stream">stream</span>`
    :`<span class="chip chip-solid">solid</span>`;

  card.innerHTML=`
    <div class="card-head">
      <span class="type-id">#${String(t.id).padStart(2,'0')}</span>
      <div class="meta-right">
        <span class="chip chip-dim">${t.w}×${t.h}</span>
        ${modeChip}
        <span class="addr-tag">${t.bmpAddr}</span>
      </div>
    </div>
    <div class="cv-wrap">
      <canvas></canvas>
    </div>
    <input class="name-input" type="text" placeholder="identify…"
           autocomplete="off" spellcheck="false">
  `;
  grid.appendChild(card);

  renderType(card.querySelector('canvas'),t);

  const inp=card.querySelector('.name-input');
  inp.addEventListener('input',()=>{
    updateCardNamed(card,inp);
    updateBadges();
    applyFilter();
  });
});

updateBadges();

// ── copy names ─────────────────────────────────────────────────────────────────
function copyNames(){
  const lines=TYPES.map(t=>{
    const nm=document.getElementById
      ? (document.querySelectorAll('.name-input')[t.id]||{}).value||'' : '';
    return `type ${String(t.id).padStart(2)}: ${t.bmpAddr}  ${t.w}x${t.h}  ${nm.trim()||'(unnamed)'}`;
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const el=document.getElementById('toast');
    el.textContent='Names copied';
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),1800);
  });
}
</script>

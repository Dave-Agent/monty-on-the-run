.ctrl-btn:hover{color:var(--text)}

.fnum{font-size:9px;color:var(--muted);letter-spacing:.06em;flex:1;text-align:right}

.name-input{background:var(--input-bg);border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:5px 3px;width:100%;outline:none}

const SCALE = 4;
const W = 24 * SCALE, H = 21 * SCALE;
const PX = '#b8f040', BG = '#060a10';
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function parseFrame(hex) {
  const b = new Uint8Array(64);
  for (let i = 0; i < 64; i++) b[i] = parseInt(hex.substr(i*2,2),16);
  return b;
}

function drawFrame(ctx, bytes) {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = PX;
  for (let row = 0; row < 21; row++) {
    const bits = (bytes[row*3]<<16)|(bytes[row*3+1]<<8)|bytes[row*3+2];
    for (let col = 0; col < 24; col++) {
      if (bits & (1 << (23-col))) ctx.fillRect(col*SCALE, row*SCALE, SCALE, SCALE);
    }
  }
}

const anims = [];
const grid = document.getElementById('grid');

for (const [tid, hexFrames] of Object.entries(FRAMES)) {
  const frames = hexFrames.map(parseFrame);
  const nframes = frames.length;
  const card = document.createElement('div');
  card.className = 'card';

  const addrHex = BANK_ADDR[tid].toString(16).toUpperCase().padStart(4,'0');
  card.innerHTML = `
    <div class="card-head">
      <span class="tid">TYPE $${parseInt(tid).toString(16).toUpperCase().padStart(2,'0')}</span>
      <span class="addr">$${addrHex} · ${nframes}f</span>
    </div>
    <div class="canvas-wrap">
      <canvas width="${W}" height="${H}" title="click to cycle frames"></canvas>
    </div>
    <div class="ctrl">
      <button class="ctrl-btn" title="prev frame">◂</button>
      <button class="ctrl-btn" title="next frame">▸</button>
      <span class="fnum">1/${nframes}</span>
    </div>
    <input class="name-input" id="name-${tid}" type="text" placeholder="identify…" autocomplete="off" spellcheck="false">
  `;
  grid.appendChild(card);

  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const fnumEl = card.querySelector('.fnum');
  const [prevBtn, nextBtn] = card.querySelectorAll('.ctrl-btn');

  const anim = {ctx, frames, nframes, cur:0, last:0, paused:reduced, fnumEl};
  anims.push(anim);
  drawFrame(ctx, frames[0]);

  function makeCur(a) {
    return function(n) {
      a.cur = ((n % a.nframes) + a.nframes) % a.nframes;
      drawFrame(a.ctx, a.frames[a.cur]);
      a.fnumEl.textContent = `${a.cur+1}/${a.nframes}`;
    };
  }
  const setCur = makeCur(anim);
  canvas.addEventListener('click', () => { anim.paused = !anim.paused; setCur(anim.cur); });
  prevBtn.addEventListener('click', () => { anim.paused = true; setCur(anim.cur - 1); });
  nextBtn.addEventListener('click', () => { anim.paused = true; setCur(anim.cur + 1); });
}

if (!reduced) {
  const FPS = 160;
  function loop(ts) {
    for (const a of anims) {
      if (a.paused) continue;
      if (ts - a.last > FPS) {
        a.last = ts;
        a.cur = (a.cur + 1) % a.nframes;
        drawFrame(a.ctx, a.frames[a.cur]);
        a.fnumEl.textContent = `${a.cur+1}/${a.nframes}`;
      }
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

function copyNames() {
  const lines = Object.keys(FRAMES).map(tid => {
    const name = document.getElementById('name-'+tid).value.trim();
    const hex = '$'+parseInt(tid).toString(16).toUpperCase().padStart(2,'0');
    return `type ${hex} (${String(tid).padStart(2)}): ${name||'(unnamed)'}`;
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  });
}
